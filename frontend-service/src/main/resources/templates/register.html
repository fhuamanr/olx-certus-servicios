<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="bg-white rounded-4 shadow-sm p-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Crear cuenta</h2>
                    <p class="text-muted mb-0">
                        Regístrate para publicar productos y contactar vendedores.
                    </p>
                </div>

                <div th:if="${error}" class="alert alert-danger rounded-4" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success rounded-4" th:text="${success}"></div>

                <form th:action="@{/register}" th:object="${user}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre completo</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control search-box"
                               placeholder="Ejemplo: Carlos Huamán"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control search-box"
                               placeholder="ejemplo@correo.com"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Teléfono</label>
                        <input type="text"
                               th:field="*{phone}"
                               class="form-control search-box"
                               placeholder="Ejemplo: 999999999">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password"
                               th:field="*{password}"
                               class="form-control search-box"
                               placeholder="Crea una contraseña"
                               required>
                    </div>

                    <button type="submit" class="btn btn-main w-100 mb-3">
                        Crear cuenta
                    </button>

                    <div class="text-center">
                        <span class="text-muted">¿Ya tienes cuenta?</span>
                        <a href="/login" class="text-decoration-none fw-semibold">
                            Inicia sesión
                        </a>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>
</html>
