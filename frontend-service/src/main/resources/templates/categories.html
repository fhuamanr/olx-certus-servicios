<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Categorías</h2>
            <p class="text-muted mb-0">Administra las categorías disponibles para las publicaciones.</p>
        </div>

        <a href="/categories/new" class="btn btn-main">
            Crear categoría
        </a>
    </div>

    <div th:if="${#lists.isEmpty(categories)}" class="empty-state">
        <h5 class="fw-bold">Aún no hay categorías registradas</h5>
        <p class="text-muted mb-3">
            Crea una categoría para poder clasificar los productos.
        </p>
        <a href="/categories/new" class="btn btn-main">Crear categoría</a>
    </div>

    <div class="bg-white rounded-4 shadow-sm p-4" th:if="${!#lists.isEmpty(categories)}">

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Categoría</th>
                        <th>Descripción</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="c : ${categories}">
                        <td th:text="${c.id}">1</td>

                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="rounded-circle d-flex align-items-center justify-content-center"
                                     style="width: 42px; height: 42px; background: #e8f5f1; color: var(--primary); font-weight: 800;">
                                    <span th:text="${#strings.substring(c.name,0,1)}">C</span>
                                </div>

                                <span class="fw-semibold" th:text="${c.name}">Categoría</span>
                            </div>
                        </td>

                        <td class="text-muted"
                            th:text="${c.description != null ? c.description : 'Sin descripción'}">
                            Descripción
                        </td>

                        <td class="text-end">
                            <a th:href="@{'/categories/edit/' + ${c.id}}"
                               class="btn btn-sm btn-outline-main">
                                Editar
                            </a>

                            <a th:href="@{'/categories/delete/' + ${c.id}}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Seguro que deseas eliminar esta categoría?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>
</html>
