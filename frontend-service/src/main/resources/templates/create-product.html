<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Publicar Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-4" style="max-width: 900px;">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h3 class="mb-4">Publicar producto</h3>

            <form method="post" action="/products/create">

                <!-- 🔹 INFORMACIÓN BÁSICA -->
                <h5 class="mb-3">📦 Información básica</h5>

                <div class="row">

                    <div class="col-md-8 mb-3">
                        <label>Nombre del producto</label>
                        <input name="name" class="form-control" placeholder="Ej: iPhone 15 Pro Max" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Precio (S/)</label>
                        <input name="price" type="number" class="form-control" required>
                    </div>

                </div>

                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea name="description" class="form-control" rows="3"
                        placeholder="Describe el estado, detalles importantes, etc."></textarea>
                </div>

                <div class="mb-4">
                    <label>Categoría</label>
                    <select name="category.id" class="form-control">
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}">
                        </option>
                    </select>
                </div>

                <!-- 🔹 IMÁGENES -->
                <h5 class="mb-3">🖼️ Imágenes</h5>

                <div class="mb-3">
                    <input name="images[0].url" class="form-control mb-2" placeholder="URL imagen principal">
                    <input type="checkbox" name="images[0].isPrimary" checked> Principal
                </div>

                <div class="mb-4">
                    <input name="images[1].url" class="form-control mb-2" placeholder="URL imagen secundaria">
                    <input type="checkbox" name="images[1].isPrimary"> Principal
                </div>

                <!-- 🔹 ATRIBUTOS -->
                <h5 class="mb-3">⚙️ Características</h5>

                <div class="row">

                    <div class="col-md-6 mb-2">
                        <input name="attributes[0].attributeName" class="form-control" placeholder="Ej: Color">
                    </div>

                    <div class="col-md-6 mb-2">
                        <input name="attributes[0].attributeValue" class="form-control" placeholder="Ej: Negro">
                    </div>

                    <div class="col-md-6 mb-2">
                        <input name="attributes[1].attributeName" class="form-control" placeholder="Ej: Memoria">
                    </div>

                    <div class="col-md-6 mb-4">
                        <input name="attributes[1].attributeValue" class="form-control" placeholder="Ej: 256GB">
                    </div>

                </div>

                <!-- 🔹 UBICACIÓN -->
                <h5 class="mb-3">📍 Ubicación</h5>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <input name="location.country" class="form-control" placeholder="País">
                    </div>

                    <div class="col-md-4 mb-3">
                        <input name="location.city" class="form-control" placeholder="Ciudad">
                    </div>

                    <div class="col-md-4 mb-3">
                        <input name="location.address" class="form-control" placeholder="Dirección">
                    </div>

                </div>

                <!-- 🔹 HIDDEN -->
                <input type="hidden" name="userId" value="1">

                <!-- 🔹 BOTÓN -->
                <button class="btn btn-warning w-100 fw-bold py-2">
                    🚀 Publicar producto
                </button>

            </form>

        </div>
    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
