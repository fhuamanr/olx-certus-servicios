<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <!-- HERO -->
    <div class="p-4 mb-4 bg-light rounded text-center">
        <h2>Compra y vende fácil</h2>
        <p>Encuentra productos cerca de ti</p>
    </div>

    <!-- SIN PRODUCTOS -->
    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info text-center">
        No hay productos disponibles
    </div>

    <!-- LISTADO PRODUCTOS -->
    <div class="row" th:if="${!#lists.isEmpty(products)}">

        <div class="col-md-3 mb-4" th:each="p : ${products}">
            <div class="card h-100 shadow-sm border-0">

                <!-- Imagen -->
				<img th:src="${p.images != null and !#lists.isEmpty(p.images) 
				               ? p.images[0].url 
				               : 'https://via.placeholder.com/300x200'}"
				     class="card-img-top">

                <div class="card-body d-flex flex-column">

                    <!-- Categoría -->
					<span class="badge bg-secondary"
					      th:text="${p.category != null ? p.category.name : 'Sin categoría'}">
					</span>

                    <!-- Nombre -->
                    <h6 class="fw-bold" th:text="${p.name}"></h6>

                    <!-- Descripción -->
                    <p class="text-muted small mb-2"
                       th:text="${p.description}">
                    </p>

                    <!-- Precio -->
                    <h5 class="text-success fw-bold mb-3"
                        th:text="'S/ ' + ${p.price}">
                    </h5>

                    <!-- Botón -->
                    <a th:href="@{'/products/' + ${p.id}}"
                       class="btn btn-outline-primary mt-auto">
                        Ver detalle
                    </a>

                </div>

            </div>
        </div>

    </div>

</div>

</html>
