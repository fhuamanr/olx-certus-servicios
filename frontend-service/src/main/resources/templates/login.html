<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="bg-white rounded-4 shadow-sm p-4">

                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Iniciar sesión</h2>
                    <p class="text-muted mb-0">
                        Accede para publicar productos o enviar solicitudes.
                    </p>
                </div>

                <div th:if="${error}" class="alert alert-danger rounded-4" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success rounded-4" th:text="${success}"></div>

                <form th:action="@{/login}" th:object="${loginRequest}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control search-box"
                               placeholder="ejemplo@correo.com"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password"
                               th:field="*{password}"
                               class="form-control search-box"
                               placeholder="Ingresa tu contraseña"
                               required>
                    </div>

                    <button type="submit" class="btn btn-main w-100 mb-3">
                        Iniciar sesión
                    </button>

                    <div class="text-center">
                        <span class="text-muted">¿No tienes cuenta?</span>
                        <a href="/register" class="text-decoration-none fw-semibold">
                            Regístrate aquí
                        </a>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>
</html>
