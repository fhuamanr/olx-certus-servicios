<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="bg-white rounded-4 shadow-sm p-4 mb-4">

                <div class="mb-4">
                    <h2 class="fw-bold mb-1">Publicar producto</h2>
                    <p class="text-muted mb-0">
                        Crea una publicación tipo OLX para que otros usuarios puedan enviarte una solicitud.
                    </p>
                </div>

                <form th:action="@{/products/create}" th:object="${product}" method="post">

                    <h5 class="fw-bold mb-3">Información principal</h5>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" th:field="*{name}" class="form-control search-box" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea th:field="*{description}" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Precio</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control search-box" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Categoría</label>
                            <select name="category.id" class="form-select" required>
                                <option value="">Selecciona categoría</option>
                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold mb-3">Imágenes</h5>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Imagen principal URL</label>
                        <input type="text"
                               name="images[0].url"
                               class="form-control search-box"
                               placeholder="https://...">
                        <input type="hidden" name="images[0].isPrimary" value="true">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Imagen secundaria URL</label>
                        <input type="text"
                               name="images[1].url"
                               class="form-control search-box"
                               placeholder="https://...">
                        <input type="hidden" name="images[1].isPrimary" value="false">
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold mb-3">Atributos</h5>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text"
                                   name="attributes[0].attributeName"
                                   class="form-control"
                                   placeholder="Ej: Color">
                        </div>
                        <div class="col-md-6">
                            <input type="text"
                                   name="attributes[0].attributeValue"
                                   class="form-control"
                                   placeholder="Ej: Negro">
                        </div>

                        <div class="col-md-6">
                            <input type="text"
                                   name="attributes[1].attributeName"
                                   class="form-control"
                                   placeholder="Ej: Memoria">
                        </div>
                        <div class="col-md-6">
                            <input type="text"
                                   name="attributes[1].attributeValue"
                                   class="form-control"
                                   placeholder="Ej: 128GB">
                        </div>
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold mb-3">Ubicación</h5>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" name="location.country" class="form-control" placeholder="País">
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="location.city" class="form-control" placeholder="Ciudad">
                        </div>
                        <div class="col-md-4">
                            <input type="text" name="location.address" class="form-control" placeholder="Dirección">
                        </div>

                        <div class="col-md-6">
                            <input type="number" step="0.000001" name="location.latitude" class="form-control" placeholder="Latitud">
                        </div>
                        <div class="col-md-6">
                            <input type="number" step="0.000001" name="location.longitude" class="form-control" placeholder="Longitud">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/" class="btn btn-outline-main">Cancelar</a>
                        <button type="submit" class="btn btn-main">Publicar producto</button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>
</html>
