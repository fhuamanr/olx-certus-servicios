<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">

<div th:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="bg-white rounded-4 shadow-sm p-4">

                <div class="mb-4">
                    <h2 class="fw-bold mb-1">Crear categoría</h2>
                    <p class="text-muted mb-0">
                        Registra una nueva categoría para clasificar las publicaciones del marketplace.
                    </p>
                </div>

                <form th:action="@{/categories/save}" th:object="${category}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre de la categoría</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control search-box"
                               placeholder="Ejemplo: Tecnología, Hogar, Moda"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea th:field="*{description}"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Describe brevemente qué tipo de productos pertenecen a esta categoría"></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/categories" class="btn btn-outline-main">
                            Cancelar
                        </a>

                        <button type="submit" class="btn btn-main">
                            Guardar categoría
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>
</html>
