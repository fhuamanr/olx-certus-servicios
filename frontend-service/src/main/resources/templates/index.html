<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OLX Demo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">Productos</h2>

	<h4>Publicar Producto</h4>

	<form method="post" action="/products/create">

	    <input name="name" class="form-control mt-2" placeholder="Nombre"/>

	    <input name="description" class="form-control mt-2" placeholder="Descripción"/>

	    <input name="price" type="number" class="form-control mt-2" placeholder="Precio"/>

	    <button class="btn btn-primary mt-3">Publicar</button>

	</form>
    <!-- LISTADO -->
    <div class="row">
        <div class="col-md-4" th:each="p : ${products}">
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 th:text="${p.name}"></h5>
                    <p th:text="${p.description}"></p>
                    <strong th:text="${p.price}"></strong>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
