<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <title>OLX Certus</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #004b3c;
            --primary-light: #0b6b57;
            --accent: #ffc107;
            --bg: #f6f7f9;
            --text: #1f2937;
            --muted: #6b7280;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .main-container {
            min-height: 70vh;
        }

        .navbar-custom {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        .topbar {
            background: var(--primary);
            color: #ffffff;
            font-size: 13px;
            padding: 6px 0;
        }

        .brand-text {
            color: var(--primary);
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
        }

        .search-box {
            background: #f3f4f6;
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
        }

        .search-box:focus {
            box-shadow: none;
            border: 1px solid var(--primary-light);
            background: #ffffff;
        }

        .btn-main {
            background: var(--primary);
            color: #ffffff;
            border-radius: 999px;
            padding: 10px 22px;
            font-weight: 600;
        }

        .btn-main:hover {
            background: var(--primary-light);
            color: #ffffff;
        }

        .btn-outline-main {
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 999px;
            padding: 10px 22px;
            font-weight: 600;
        }

        .btn-outline-main:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .btn-publish {
            background: var(--accent);
            color: #111827;
            border-radius: 999px;
            padding: 10px 18px;
            font-weight: 700;
            border: 0;
        }

        .hero-section {
            background: linear-gradient(90deg, #c7f0f7 0%, #f8e4b4 100%);
            border-radius: 22px;
            padding: 55px 45px;
            overflow: hidden;
        }

        .category-card {
            border: 0;
            border-radius: 18px;
            overflow: hidden;
            min-height: 120px;
            background: #ffffff;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        .product-card {
            border: 0;
            border-radius: 18px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
        }

        .product-img {
            height: 210px;
            object-fit: cover;
            background: #f3f4f6;
        }

        .section-title {
            font-weight: 800;
            margin-bottom: 20px;
        }

        .empty-state {
            background: #ffffff;
            border-radius: 18px;
            padding: 40px;
            text-align: center;
            border: 1px dashed #d1d5db;
        }

        footer {
            margin-top: 60px;
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="container main-container mt-4">
        <div th:insert="${content}"></div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
